# Template Base docker-compose.yaml - Embrapa I/O
# Este é um template base que deve ser adaptado para cada stack

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8080"
    environment:
      # Adicionar variáveis de ambiente específicas da aplicação
      APP_ENV: ${IO_STAGE}
    networks:
      - stack
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Serviço CLI: Backup
  # Uso: env $(cat .env.io) docker compose run --rm backup
  backup:
    image: alpine:latest
    restart: "no"
    profiles:
      - cli
    volumes:
      - backup_data:/backup
      - app_data:/data:ro
    networks:
      - stack
    environment:
      IO_PROJECT: ${IO_PROJECT}
      IO_APP: ${IO_APP}
      IO_STAGE: ${IO_STAGE}
      IO_VERSION: ${IO_VERSION}
    command: >
      sh -c "
        set -e &&
        echo '🔄 Iniciando backup...' &&
        echo '📦 Projeto: ${IO_PROJECT}/${IO_APP} [${IO_STAGE}]' &&
        echo '📌 Versão: ${IO_VERSION}' &&
        BACKUP_NAME=${IO_PROJECT}_${IO_APP}_${IO_STAGE}_${IO_VERSION}_$$(date +'%Y-%m-%d_%H-%M-%S') &&
        BACKUP_DIR=/backup/$$BACKUP_NAME &&
        mkdir -p $$BACKUP_DIR &&
        echo '📂 Copiando dados para backup...' &&
        cp -r /data/* $$BACKUP_DIR/ 2>/dev/null || echo '⚠️ Nenhum dado em /data' &&
        echo '📦 Compactando backup...' &&
        cd /backup && tar -czf $$BACKUP_NAME.tar.gz $$BACKUP_NAME &&
        rm -rf $$BACKUP_DIR &&
        echo '✅ Backup concluído: $$BACKUP_NAME.tar.gz' &&
        ls -lh /backup/$$BACKUP_NAME.tar.gz
      "

  # Serviço CLI: Restore
  # Uso: env $(cat .env.io) BACKUP_FILE=arquivo.tar.gz docker compose run --rm restore
  restore:
    image: alpine:latest
    restart: "no"
    profiles:
      - cli
    volumes:
      - backup_data:/backup:ro
      - app_data:/data
    networks:
      - stack
    environment:
      BACKUP_FILE: ${BACKUP_FILE:-}
    command: >
      sh -c "
        set -e &&
        echo '🔄 Iniciando restauração...' &&
        if [ -z \"$$BACKUP_FILE\" ]; then
          echo '❌ Erro: Variável BACKUP_FILE não definida' &&
          echo '💡 Uso: BACKUP_FILE=arquivo.tar.gz docker compose run --rm restore' &&
          echo '' &&
          echo '📋 Backups disponíveis:' &&
          ls -lh /backup/*.tar.gz 2>/dev/null || echo '  Nenhum backup encontrado' &&
          exit 1
        fi &&
        if [ ! -f \"/backup/$$BACKUP_FILE\" ]; then
          echo \"❌ Erro: Arquivo /backup/$$BACKUP_FILE não encontrado\" &&
          exit 1
        fi &&
        echo \"📦 Restaurando: $$BACKUP_FILE\" &&
        RESTORE_DIR=$$(mktemp -d) &&
        tar -xzf /backup/$$BACKUP_FILE -C $$RESTORE_DIR --strip-components=1 &&
        echo '📂 Copiando dados restaurados...' &&
        cp -r $$RESTORE_DIR/* /data/ 2>/dev/null || true &&
        rm -rf $$RESTORE_DIR &&
        echo '✅ Restauração concluída com sucesso!'
      "

  # Serviço CLI: Sanitize
  # Uso: env $(cat .env.io) docker compose run --rm sanitize
  sanitize:
    image: alpine:latest
    restart: "no"
    profiles:
      - cli
    volumes:
      - app_data:/data
    networks:
      - stack
    command: >
      sh -c "
        set -e &&
        echo '🧹 Iniciando sanitização e otimização...' &&
        echo '📊 Uso de disco antes:' &&
        du -sh /data 2>/dev/null || echo '  /data vazio ou inacessível' &&
        echo '' &&
        echo '🔍 Removendo arquivos temporários...' &&
        find /data -type f -name '*.tmp' -delete 2>/dev/null || true &&
        find /data -type f -name '*.log' -mtime +30 -delete 2>/dev/null || true &&
        find /data -type f -name '.DS_Store' -delete 2>/dev/null || true &&
        echo '' &&
        echo '📊 Uso de disco depois:' &&
        du -sh /data 2>/dev/null || echo '  /data vazio ou inacessível' &&
        echo '' &&
        echo '✅ Sanitização concluída!'
      "

networks:
  stack:
    name: ${IO_PROJECT}_${IO_APP}_${IO_STAGE}
    external: true

volumes:
  backup_data:
    name: ${IO_PROJECT}_${IO_APP}_${IO_STAGE}_backup
    external: true
  app_data:
    name: ${IO_PROJECT}_${IO_APP}_${IO_STAGE}_data
    external: true
